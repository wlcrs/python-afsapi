---
repos:
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
        name: ⮐  Fix End of Files
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: trailing-whitespace
        name: ✄  Trim Trailing Whitespace
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: detect-private-key
        name: 🕵️  Detect Private Keys
        language: system
        types: [text]
      - id: check-toml
        name: ✅ Check TOML files
        language: system
        types: [toml]
      - id: check-xml
        name: ✅ Check XML files
        language: system
        types: [xml]
      - id: check-yaml
        name: ✅ Check YAML files
        language: system
        types: [yaml]
      - id: check-json
        name: ｛ Check JSON files
        language: system
        types: [json]
      - id: check-executables-have-shebangs
        name: 🧐 Check that executables have shebangs
        language: system
        types: [text, executable]
        stages: [pre-commit, pre-push, manual]
      - id: check-symlinks
        name: 🔗 Check for broken symlinks
        language: system
        types: [symlink]
      - id: check-merge-conflict
        name: 💥 Check for merge conflicts
        language: system
        types: [text]
      - id: check-case-conflict
        name: 🔠 Check for case conflicts
        language: system

  - repo: local
    hooks:
      - id: ruff-check
        name: 🐶 Ruff Linter
        language: system
        types: [python]
        entry: uv run ruff check --fix
        require_serial: true
        stages: [pre-commit, pre-push, manual]
      - id: ruff-format
        name: 🐶 Ruff Formatter
        language: system
        types: [python]
        entry: uv run ruff format
        require_serial: true
        stages: [pre-commit, pre-push, manual]
      - id: codespell
        name: ✅ Check code for common misspellings
        language: system
        types: [text]
        exclude: ^uv\.lock$
        entry: uv run codespell
      - id: mypy
        name: 🆎 Static type checking using mypy
        language: system
        types: [python]
        entry: uv run mypy
        require_serial: true
      - id: pylint
        name: 🌟 Starring code with pylint
        language: system
        types: [python]
        exclude: ^tests/
        entry: uv run pylint
      - id: pytest
        name: 🧪 Running tests and test coverage with pytest
        language: system
        types: [python]
        entry: uv run pytest
        pass_filenames: false
      - id: yamllint
        name: 🎗  Check YAML files with yamllint
        language: system
        types: [yaml]
        entry: uv run yamllint
